# Martin Tile Server — Configuração
# Imagem: ghcr.io/maplibre/martin:latest
# Reprojecção SIRGAS 2000 (4674) → Web Mercator (3857) feita automaticamente ao gerar MVT

listen_addresses: "0.0.0.0:3000"

postgres:
  connection_string: "${DATABASE_URL}"
  pool_size: 10

sources:

  seg_bt:
    schema: rede_bt
    table: seg_bt
    srid: 4674
    geometry_column: geom
    id_column: id
    minzoom: 13
    maxzoom: 22
    properties:
      - cod_id
      - distribuidora
      - tensao_nom
      - comprimento
      - fases
      - condutor
      - ano_ref

  seg_mt:
    schema: rede_bt
    table: seg_mt
    srid: 4674
    geometry_column: geom
    id_column: id
    minzoom: 11
    maxzoom: 22
    properties:
      - cod_id
      - distribuidora
      - tensao_nom
      - comprimento
      - fases
      - condutor
      - ano_ref

  trafo:
    schema: rede_bt
    table: trafo
    srid: 4674
    geometry_column: geom
    id_column: id
    minzoom: 13
    maxzoom: 22
    properties:
      - cod_id
      - distribuidora
      - potencia_kva
      - tensao_prim
      - tensao_sec
      - ano_ref

  subestacao:
    schema: rede_bt
    table: subestacao
    srid: 4674
    geometry_column: geom
    id_column: id
    minzoom: 8
    maxzoom: 22
    properties:
      - cod_id
      - nome
      - distribuidora
      - potencia_mva
      - tensao_prim
      - tensao_sec
      - ano_ref

  consumidor_pj:
    schema: rede_bt
    table: consumidor_pj
    srid: 4674
    geometry_column: geom
    id_column: id
    minzoom: 11
    maxzoom: 22
    properties:
      - cod_id
      - distribuidora
      - nivel_tensao
      - classe
      - demanda_kw
      - ano_ref
